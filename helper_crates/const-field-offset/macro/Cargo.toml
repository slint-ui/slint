[package]
name = "const-field-offset-macro"
version = "0.2.0"
authors = ["Slint Developers <info@slint.dev>"]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Procedural macro to generate constant field offsets using core::mem::offset_of!"
repository = "https://github.com/slint-ui/slint"
homepage = "https://slint.dev"

[lib]
path = "macro.rs"
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["derive"] }
quote = "1.0"
proc-macro2 = "1.0"

[dev-dependencies]
memoffset = "0.9.0"
const-field-offset = { path = ".." }
