name: Swift Test (Reusable)

on:
    workflow_call:
      inputs:
        name:
            description: 'Name of the job'
            required: true
            type: string
        os:
            description: 'Operating system to run on'
            required: true
            type: string

env:
    RUSTFLAGS: -D warnings
    CARGO_PROFILE_DEV_DEBUG: 0
    CARGO_INCREMENTAL: false
    RUST_BACKTRACE: full

jobs:
    swift_test:
        name: ${{ inputs.name }}
        runs-on: ${{ inputs.os }}
        steps:
            - uses: actions/checkout@v6
            - name: Install Swift 6.2.0
              run: |
                  curl -fsSL https://download.swift.org/swift-6.2.0-release/xcode/swift-6.2.0-RELEASE/swift-6.2.0-RELEASE-osx.pkg \
                    -o swift-6.2.0.pkg
                  sudo installer -pkg swift-6.2.0.pkg -target /
                  rm swift-6.2.0.pkg
                  swift --version
            - uses: ./.github/actions/setup-rust
            - name: Build Rust static library
              run: cargo build --lib -p slint-swift
            - name: Run Swift tests
              working-directory: api/swift
              run: swift test
