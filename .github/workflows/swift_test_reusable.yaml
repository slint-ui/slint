name: Swift Test (Reusable)

on:
    workflow_call:
      inputs:
        name:
            description: 'Name of the job'
            required: true
            type: string
        os:
            description: 'Operating system to run on'
            required: true
            type: string

env:
    RUSTFLAGS: -D warnings
    CARGO_PROFILE_DEV_DEBUG: 0
    CARGO_INCREMENTAL: false
    RUST_BACKTRACE: full

jobs:
    swift_test:
        name: ${{ inputs.name }}
        runs-on: ${{ inputs.os }}
        steps:
            - uses: actions/checkout@v6
            - uses: swift-actions/setup-swift@v2.4.0
              with:
                  swift-version: "6.2"
            - name: Verify Swift version
              run: swift --version
            - uses: ./.github/actions/setup-rust
            - name: Install Linux system dependencies
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
            - name: Build Rust static library
              run: cargo build --lib -p slint-swift --features interpreter,backend-testing
            - name: Run Swift unit tests
              working-directory: api/swift
              run: swift test
            - name: Run Swift test driver
              run: SLINT_TEST_FILTER=swift cargo test -p test-driver-swift
