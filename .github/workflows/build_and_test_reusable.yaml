name: Build and Test (Reusable)

on:
    workflow_call:
        inputs:
            name:
                description: 'Name of the job'
                required: true
                type: string
            os:
                description: 'Operating system to run on'
                required: true
                type: string
            rust_version:
                description: 'Rust version to use'
                required: true
                type: string
            update:
                description: 'Whether to run cargo update before testing'
                required: false
                type: boolean
                default: false
            extra_args:
                description: 'Extra arguments to pass to cargo test'
                required: false
                type: string
                default: ""
            cache:
                description: 'Use rust-cache'
                required: false
                type: boolean
                default: true
            save_if:
                description: 'Condition to save the cache'
                required: false
                type: boolean
                default: true
            run_qt:
                description: 'Run Qt widget tests'
                required: false
                type: boolean
                default: true
            test_workspace:
                description: 'Test the root workspace (library and tool crates)'
                required: false
                type: boolean
                default: true
            test_integration:
                description: 'Run the integration tests (tests/ workspace)'
                required: false
                type: boolean
                default: true
            build_examples:
                description: 'Build the examples and demos workspaces'
                required: false
                type: boolean
                default: true
            timeout_minutes:
                description: 'Timeout in minutes'
                required: false
                type: number
                default: 120

jobs:
    build_and_test:
        name: ${{ inputs.name }}
        timeout-minutes: ${{ inputs.timeout_minutes }}
        env:
            MACOSX_DEPLOYMENT_TARGET: "11.0"
            DYLD_FRAMEWORK_PATH: /Users/runner/work/slint/Qt/6.2.2/macos/lib
            QT_QPA_PLATFORM: offscreen
            RUSTFLAGS: -D warnings
            CARGO_PROFILE_DEV_DEBUG: 0
            CARGO_INCREMENTAL: false
            RUST_BACKTRACE: 1
            SLINT_EMIT_DEBUG_INFO: 1

        runs-on: ${{ inputs.os }}

        steps:
            - name: Maximize build space
              if: runner.os == 'Linux'
              run: |
                df -h
                [ -d /usr/local/lib/android ] && sudo rm -rf /usr/local/lib/android
                [ -d /usr/share/dotnet ] && sudo rm -rf /usr/share/dotnet
                # For now, comment out a few of these deletion commands to speed up the runner startup
                # [ -d /opt/ghc ] && sudo rm -rf /opt/ghc
                # [ -d /opt/hostedtoolcache/CodeQL ] && sudo rm -rf /opt/hostedtoolcache/CodeQL
                # Pruning docker images could free up another 3GB
                # sudo docker image prune --all --force
                df -h
            - uses: actions/checkout@v7
            - uses: ./.github/actions/install-linux-dependencies
            - uses: ./.github/actions/install-skia-dependencies
            - uses: ilammy/msvc-dev-cmd@v1
            - uses: actions/setup-python@v6
              with:
                python-version: '3.10'
            - name: Install uv
              uses: astral-sh/setup-uv@v7
            - name: Install Qt
              if: runner.os != 'Windows'
              uses: jurplel/install-qt-action@v4
              with:
                  version: "6.2.2"
                  setup-python: false
                  cache: true
            - name: Install ffmpeg, alsa, gstreamer and libunwind (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get install clang libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libavdevice-dev libasound2-dev pkg-config libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
            - name: Setup headless display
              if: runner.os != 'macOS'
              uses: pyvista/setup-headless-display-action@v4
            - uses: ./.github/actions/setup-rust
              with:
                  toolchain: ${{ inputs.rust_version }}
                  key: x-v3
                  save_if: ${{ inputs.save_if }}
                  cache: ${{ inputs.cache }}
            - name: Cargo update
              if: inputs.update
              # Ignore rust_version for stable/nightly to test with latest dependencies
              run: cargo update ${{ (inputs.rust_version == 'stable' || inputs.rust_version == 'nightly') && '--ignore-rust-version' || '' }}
            - name: Run tests
              if: inputs.test_workspace
              # The excluded crates are the root-workspace members that need a
              # dedicated toolchain (node/python/cpp) and are covered by their own
              # ci.yaml jobs. Crates moved into the examples/demos/tests workspaces
              # are no longer root members, so they need no exclude here.
              run: "cargo test --locked --verbose --all-features --workspace --timings ${{ inputs.extra_args }} --exclude slint-node --exclude slint-cpp --exclude slint-python --exclude slint-sc -- --skip=qt::"
              env:
                  SLINT_CREATE_SCREENSHOTS: 1
              shell: bash
            - name: Run tests (qt)
              if: runner.os != 'Windows' && inputs.run_qt && inputs.test_workspace
              run: "cargo test --locked --verbose --all-features --workspace ${{ inputs.extra_args }} --exclude slint-node --exclude slint-cpp --exclude slint-python --exclude slint-sc qt:: -- --test-threads=1"
              shell: bash
            # The integration tests now live in their own workspace (tests/Cargo.toml).
            # The C++/Node/Python drivers and doctests are run by dedicated jobs in ci.yaml.
            - name: Run integration tests
              if: inputs.test_integration
              run: "cargo test --locked --verbose --all-features --workspace --timings --manifest-path tests/Cargo.toml ${{ inputs.extra_args }} --exclude doctests --exclude test-driver-nodejs --exclude test-driver-cpp --exclude test-driver-python -- --skip=qt::"
              env:
                  SLINT_CREATE_SCREENSHOTS: 1
              shell: bash
            - name: Run integration tests (qt)
              if: runner.os != 'Windows' && inputs.run_qt && inputs.test_integration
              run: "cargo test --locked --verbose --all-features --workspace --manifest-path tests/Cargo.toml ${{ inputs.extra_args }} --exclude doctests --exclude test-driver-nodejs --exclude test-driver-cpp --exclude test-driver-python qt:: -- --test-threads=1"
              shell: bash
            # The examples and demos are also their own workspaces. The mcu/uefi
            # members need dedicated targets/features and are checked in ci.yaml.
            # bevy and servo have heavy dependencies and dedicated workflows
            # (bevy_examples.yaml, servo_example.yaml), so they are excluded here.
            - name: Build examples
              if: inputs.build_examples
              run: "cargo test --locked --verbose --all-features --workspace --timings --manifest-path examples/Cargo.toml ${{ inputs.extra_args }} --exclude mcu-board-support --exclude bevy-example --exclude bevy-hosts-slint --exclude bevy-hosts-slint-gpu --exclude servo-example"
              shell: bash
            - name: Build demos
              if: inputs.build_examples
              run: "cargo test --locked --verbose --all-features --workspace --timings --manifest-path demos/Cargo.toml ${{ inputs.extra_args }} --exclude printerdemo_mcu"
              shell: bash
            - name: live-preview for rust test
              if: runner.os == 'macOS' && inputs.test_integration
              env:
                SLINT_LIVE_PREVIEW: 1
              run: cargo test --locked --verbose --all-features --manifest-path tests/Cargo.toml --features slint/live-preview -p test-driver-rust -- --skip=_qt::t
              shell: bash
            # The linked Skia libraries are plain files in out/skia; the
            # subdirectories are ninja intermediates from a source build and
            # .cache holds the downloaded archives. Neither belongs in the
            # multi-gigabyte rust-cache blob this job saves on master.
            - name: Trim Skia build intermediates before the cache is saved
              if: always()
              shell: bash
              run: |
                  for dir in target/*/build/skia-bindings-*/out; do
                      [ -d "$dir" ] || continue
                      find "$dir/skia" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
                      rm -rf "$dir/.cache"
                  done
            - name: Upload build timing reports
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  # Every workspace build above passes --timings and they share the
                  # target/ directory, so cargo drops a timestamped report per run
                  # here. Upload the whole directory to keep all of them (the plain
                  # cargo-timing.html is overwritten by each successive build).
                  name: cargo-timings-${{ inputs.os }}-${{ inputs.rust_version }}
                  path: target/cargo-timings/
                  if-no-files-found: ignore
            - name: Archive screenshots after failed tests
              if: ${{ failure() }}
              uses: actions/upload-artifact@v7
              with:
                  name: screenshots-${{ inputs.os }}
                  path: |
                      tests/screenshots/references
            - name: Print Disk Usage
              if: always()
              run: df -h

