# Build various demo binaries, c++ packages and documentation and publish them on the website
# Job 1 (rust-cpp-docs): Build Rust and C++ documentation
# Job 2 (astro-docs-tests): Generate screenshots, build Astro docs and run tests
# Job 3 (node-python-docs): Build Node and Python documentation
# Job 4 (check-warnings): Validate docs for warnings

name: Build docs

on:
    workflow_call:
      secrets:
        READ_WRITE_PRIVATE_KEY:
          required: true
      inputs:
        release:
          type: string
          default: "false"
          required: false
          description: "Release? Enable options for building binaries for a release (i.e. apply a nightly tag, nightly version)"
        app-id:
          type: string
          required: true

jobs:
    # Job 1: Build Rust and C++ documentation
    rust-cpp-docs:
        runs-on: ubuntu-24.04
        env:
            # Allow deprecated warning because we are using nightly and some things might be deprecated in nightly
            # for which the stable alternative is not yet available.
            RUSTFLAGS: -D warnings -W deprecated --cfg slint_nightly_test
            RUSTDOCFLAGS: --html-in-header=/home/runner/work/slint/slint/docs/astro/src/utils/slint-docs-highlight.html -D warnings -W deprecated --cfg docsrs -Zunstable-options --generate-link-to-definition
            SLINT_NO_QT: 1
            CARGO_INCREMENTAL: false
            RELEASE_INPUT: ${{ inputs.release }}
            BRANCH_NAME: ${{ github.ref_name }}
        steps:
            - uses: actions/checkout@v7
            - name: Set up crate rustdoc link
              run: |
                  rgb_version=`grep 'rgb = '  internal/core/Cargo.toml | sed 's/^.*"\(.*\)"/\1/'`
                  echo "RUSTDOCFLAGS=$RUSTDOCFLAGS --extern-html-root-url rgb=https://docs.rs/rgb/$rgb_version/ --extern-html-root-url android_activity=https://docs.rs/android-activity/0.5/ --extern-html-root-url raw_window_handle=https://docs.rs/raw_window_handle/0.6 --extern-html-root-url winit=https://docs.rs/winit/0.30 --extern-html-root-url wgpu=https://docs.rs/wgpu/30 --extern-html-root-url input=https://docs.rs/input/0.9 --extern-html-root-url fontique=https://docs.rs/fontique/0.8" >> $GITHUB_ENV
            - uses: ./.github/actions/install-linux-dependencies
            - uses: pnpm/action-setup@v6.0.9
              with:
                version: 10.29.3
            - uses: actions/setup-node@v7
              with:
                node-version: 24
                package-manager-cache: false
            - uses: ./.github/actions/setup-rust
              with:
                  toolchain: nightly
                  target: aarch64-linux-android
            - name: Install apt dependencies
              run: sudo apt-get install doxygen
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: Test Cpp docs converter
              run: pnpm -C docs/cpp test
            - name: Download cppreference Doxygen tag file
              run: |
                # Lets Doxygen link std:: types to cppreference.com. The tag file
                # is bundled in the cppreference-doc html-book release; pin a known
                # version for reproducibility. The build degrades gracefully (std
                # types stay plain) if this variable is unset.
                tag_file="$PWD/target/cppreference-doxygen-web.tag.xml"
                mkdir -p "$(dirname "$tag_file")"
                curl -fsSL --retry 3 -o /tmp/cppreference-html-book.tar.xz \
                  "https://github.com/PeterFeicht/cppreference-doc/releases/download/v20250209/html-book-20250209.tar.xz"
                tar -xJf /tmp/cppreference-html-book.tar.xz -C "$(dirname "$tag_file")" cppreference-doxygen-web.tag.xml
                echo "SLINT_CPPREFERENCE_TAGFILE=$tag_file" >> "$GITHUB_ENV"
            - name: Build Cpp docs
              run: |
                if [ "$RELEASE_INPUT" != "true" ] && [[ ! "$BRANCH_NAME" =~ ^pre-release/ ]]; then
                    export SLINT_CPP_DOCS_EXPERIMENTAL=1
                fi
                version=$(awk '/^\[workspace.package\]/ {found=1} found && /^version = / {gsub(/version = |"/, "", $0); print $0; exit}' Cargo.toml)
                if [ "$RELEASE_INPUT" != "true" ]; then
                    base_url="https://snapshots.slint.dev"
                    base_path="/master/docs/cpp/"
                else
                    base_url="https://releases.slint.dev"
                    base_path="/$version/docs/cpp/"
                fi
                sed -i "s|export const CPP_DOCS_BASE_URL = \".*\"|export const CPP_DOCS_BASE_URL = \"$base_url\"|" docs/cpp/src/cpp-site-config.mjs
                sed -i "s|export const CPP_DOCS_BASE_PATH = \".*\"|export const CPP_DOCS_BASE_PATH = \"$base_path\"|" docs/cpp/src/cpp-site-config.mjs
                # The site's `gen:api` step generates the cbindgen headers
                # (`cargo xtask generate_cppdocs_headers`), runs Doxygen (XML) and
                # the Doxygen-to-Markdown converter; `build` then builds the static site.
                pnpm -C docs/cpp run build
            - name: "Rust docs"
              run: cargo doc -p slint -p slint-build -p slint-interpreter --no-deps --all-features
            - name: "Rust android-activity and i-slint-backend-winit"
              run: |
                  cargo doc -p i-slint-backend-android-activity -p i-slint-backend-winit -p i-slint-backend-testing --no-deps --target aarch64-linux-android --features=i-slint-backend-android-activity/native-activity,i-slint-backend-android-activity/aa-06,i-slint-backend-winit/raw-window-handle-06,i-slint-backend-winit/renderer-femtovg
                  cp -r target/aarch64-linux-android/doc/i_slint_backend_android_activity/ target/doc/
                  cp -r target/aarch64-linux-android/doc/i_slint_backend_winit/ target/doc/
                  cp -r target/aarch64-linux-android/doc/i_slint_backend_testing/ target/doc/
            - name: "Prepare Rust and C++ docs for website directory structure"
              run: |
                  mkdir -p artifact/docs
                  mv target/doc artifact/docs/rust
                  mv docs/cpp/dist artifact/docs/cpp
            - name: "Upload Rust/C++ Docs Artifacts"
              uses: actions/upload-artifact@v7
              with:
                  name: docs-rust-cpp
                  path: artifact
            - name: "Check for docs warnings in internal crates"
              run: cargo doc --workspace --no-deps --all-features --exclude slint-node --exclude pyslint --exclude mcu-board-support --exclude mcu-embassy --exclude printerdemo_mcu --exclude carousel --exclude test-* --exclude plotter --exclude uefi-demo --exclude ffmpeg --exclude gstreamer-player --exclude slint-cpp --exclude slint-python

    # Job 2: Build Astro docs and run tests
    astro-docs-tests:
        runs-on: ubuntu-24.04
        outputs:
            version: ${{ steps.version.outputs.VERSION }}
        env:
            RUSTFLAGS: -D warnings -W deprecated
            RUSTDOCFLAGS: --html-in-header=/home/runner/work/slint/slint/docs/astro/src/utils/slint-docs-highlight.html -D warnings -W deprecated --cfg docsrs -Zunstable-options --generate-link-to-definition
            SLINT_NO_QT: 1
            CARGO_INCREMENTAL: false
            RELEASE_INPUT: ${{ inputs.release }}
            BRANCH_NAME: ${{ github.ref_name }}
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6.0.9
              with:
                version: 10.29.3
            - uses: actions/setup-node@v7
              with:
                node-version: 24
                package-manager-cache: false
            - uses: ./.github/actions/install-linux-dependencies
            - name: Install MS fonts for comic sans needed by one of the screenshots in the docs
              run: |
                  echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
                  sudo apt-get install ttf-mscorefonts-installer -y
            - uses: ./.github/actions/setup-rust
              with:
                  toolchain: stable
                  target: aarch64-linux-android
                  cache: false
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: Extract Version from Cargo.toml
              id: version
              run: |
                version=$(awk '/^\[workspace.package\]/ {found=1} found && /^version = / {gsub(/version = |"/, "", $0); print $0; exit}' Cargo.toml)
                if [[ -z "$version" ]]; then
                  echo "Version not found"
                  exit 1
                fi
                  echo "VERSION=$version" >> $GITHUB_OUTPUT
            - name: Update URL for sitemap in site-config.ts
              run: |
                version="${{ steps.version.outputs.VERSION }}"
                if [ "$RELEASE_INPUT" != "true" ]; then
                    base_url="https://snapshots.slint.dev"
                    base_path="/master/docs/slint/"
                    safety_base_path="/master/docs/safety/"
                    slint_download_version=nightly
                else
                    base_url="https://releases.slint.dev"
                    base_path="/$version/docs/slint/"
                    safety_base_path="/$version/docs/safety/"
                    slint_download_version=v$version
                fi
                sed -i "s|BASE_URL = \".*\"|BASE_URL = \"$base_url\"|" docs/common/src/utils/site-config.ts
                sed -i "s|BASE_PATH = \".*\"|BASE_PATH = \"$base_path\"|" docs/common/src/utils/site-config.ts
                sed -i "s|SLINT_DOWNLOAD_VERSION = \".*\"| SLINT_DOWNLOAD_VERSION = \"$slint_download_version\"|" docs/common/src/utils/site-config.ts
                sed -i "s|export const SAFETY_DOCS_BASE_URL = \".*\"|export const SAFETY_DOCS_BASE_URL = \"$base_url\"|" docs/safety/src/safety-site-config.mjs
                sed -i "s|export const SAFETY_DOCS_BASE_PATH = \".*\"|export const SAFETY_DOCS_BASE_PATH = \"$safety_base_path\"|" docs/safety/src/safety-site-config.mjs
            - name: "Generate screenshots, language documentation and build"
              run: |
                EXTRA_FLAGS=""
                if [ "$RELEASE_INPUT" != "true" ] && [[ ! "$BRANCH_NAME" =~ ^pre-release/ ]]; then
                  EXTRA_FLAGS="--experimental"
                fi
                cargo run --release -p slint-doc-generator -- $EXTRA_FLAGS
            - name: "Generate SC API reference"
              run: cargo run --release -p slint-doc-generator -- --slint-sc generate-mdx
            - name: "Compile Slint snippets in Markdown (doctests)"
              run: cargo test --manifest-path tests/Cargo.toml -p doctests
            - name: "Build Safety Manual"
              working-directory: docs/safety
              run: pnpm build
            - name: Install Playwright
              working-directory: docs/astro
              run: pnpm exec playwright install --with-deps
            - name: Run Playwright tests
              working-directory: docs/astro
              run: pnpm exec playwright test
            - name: Publish Test Summary Results
              working-directory: docs/astro
              run: npx github-actions-ctrf playwright-report/ctrf-report.json
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                name: playwright-test-report
                path: docs/astro/playwright-report/
                retention-days: 30
            - name: Debug - Verify dist exists before upload
              run: |
                echo "=== Checking docs/astro/dist ==="
                ls -la docs/astro/ || echo "docs/astro/ does not exist"
                ls -la docs/astro/dist/ || echo "docs/astro/dist/ does not exist"
                echo "File count in dist: $(find docs/astro/dist -type f 2>/dev/null | wc -l)"
                echo "First 10 files:"
                find docs/astro/dist -type f 2>/dev/null | head -10
            - name: "Prepare docs for website structure"
              run: |
                mkdir -p artifact/docs
                mv docs/astro/dist artifact/docs/slint
                mv docs/safety/dist artifact/docs/safety
            - name: "Upload Astro Docs Artifacts"
              uses: actions/upload-artifact@v7
              with:
                name: docs-astro
                path: artifact

    # Job 3: Build Node and Python documentation
    node-python-docs:
        runs-on: ubuntu-24.04
        env:
            RELEASE_INPUT: ${{ inputs.release }}
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6.0.9
              with:
                version: 10.29.3
            - uses: actions/setup-node@v7
              with:
                node-version: 24
                package-manager-cache: false
            - uses: ./.github/actions/install-linux-dependencies
            - uses: ./.github/actions/setup-rust
              with:
                  toolchain: stable
                  target: aarch64-linux-android
                  cache: false
            - name: Install uv
              uses: astral-sh/setup-uv@v7
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: Extract version from Cargo.toml
              id: version
              run: |
                  version=$(awk '/^\[workspace.package\]/ {found=1} found && /^version = / {gsub(/version = |"/, "", $0); print $0; exit}' Cargo.toml)
                  if [[ -z "$version" ]]; then
                    echo "Version not found"
                    exit 1
                  fi
                  echo "VERSION=$version" >> $GITHUB_OUTPUT
            - name: "Update site and base for Node.js Starlight (sitemap and assets)"
              run: |
                  version="${{ steps.version.outputs.VERSION }}"
                  if [ "$RELEASE_INPUT" != "true" ]; then
                      base_url="https://snapshots.slint.dev"
                      base_path="/master/docs/node/"
                  else
                      base_url="https://releases.slint.dev"
                      base_path="/$version/docs/node/"
                  fi
                  sed -i "s|export const NODE_DOCS_BASE_URL = \".*\"|export const NODE_DOCS_BASE_URL = \"$base_url\"|" docs/nodejs/src/node-site-config.mjs
                  sed -i "s|export const NODE_DOCS_BASE_PATH = \".*\"|export const NODE_DOCS_BASE_PATH = \"$base_path\"|" docs/nodejs/src/node-site-config.mjs
            - name: "Update site and base for Python Starlight (sitemap and assets)"
              run: |
                  version="${{ steps.version.outputs.VERSION }}"
                  if [ "$RELEASE_INPUT" != "true" ]; then
                      base_url="https://snapshots.slint.dev"
                      base_path="/master/docs/python/"
                  else
                      base_url="https://releases.slint.dev"
                      base_path="/$version/docs/python/"
                  fi
                  sed -i "s|export const PYTHON_DOCS_BASE_URL = \".*\"|export const PYTHON_DOCS_BASE_URL = \"$base_url\"|" docs/python/src/python-site-config.mjs
                  sed -i "s|export const PYTHON_DOCS_BASE_PATH = \".*\"|export const PYTHON_DOCS_BASE_PATH = \"$base_path\"|" docs/python/src/python-site-config.mjs
            - name: "Build NAPI and TypeScript (api/node)"
              run: pnpm run build:minimal
              working-directory: api/node
            - name: "Node.js API Starlight site"
              run: pnpm run build
              working-directory: docs/nodejs
            - name: "Test the Python docs generator"
              run: uv run pytest
              working-directory: docs/python
            - name: "Lint the Python docs generator"
              run: uv tool run ruff check
              working-directory: docs/python
            - name: "Type-check the Python docs generator"
              run: uvx ty check
              working-directory: docs/python
            - name: "Generate Python language stubs"
              # The slint-python build script writes slint/language.pyi (the
              # Slint language structs and enums). griffe reads it statically
              # when gen_mdx.py builds the `language` API page, so it must exist
              # before the docs build below.
              run: cargo build -p slint-python --no-default-features
            - name: "Python API Starlight site"
              run: pnpm run build
              working-directory: docs/python
            - name: "Prepare docs for website structure"
              run: |
                  mkdir -p artifact/docs
                  mv docs/nodejs/dist artifact/docs/node
                  mv docs/python/dist artifact/docs/python
            - name: "Upload Python/Node Docs Artifacts"
              uses: actions/upload-artifact@v7
              with:
                  name: docs-node-python
                  path: artifact
