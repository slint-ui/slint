# This workflow checks out and build a bunch of crates that uses Slint,
# with the current branch

name: Crater

on:
    workflow_dispatch:

jobs:
    # The crater matrix is split across two jobs (crater and crater_subpath) because GitHub
    # limits a matrix to 256 jobs; the combined project list exceeds that. crater builds the
    # projects that live at the repository root; crater_subpath builds those in a sub-directory.
