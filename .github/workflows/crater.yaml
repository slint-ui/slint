        runs-on: "ubuntu-latest"
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: slint-compiler
                  path: slint-compiler-bin
            - name: Prepare slint-compiler
              run: |
                  chmod +x slint-compiler-bin/slint-compiler
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends libfontconfig1 libfreetype6
            - name: Checkout the repo
              run: |
                  cd $HOME
                  git clone ${{ matrix.git_url }} the_repo --depth 1
                  cd the_repo
                  git submodule update --init --recursive
            - name: Compile the .slint files
              run: |
                  cd $HOME/the_repo
                  ui_inc=""
                  [ -d ui ] && ui_inc="-I ui"
                  for f in ${{ matrix.files }}; do
                      echo "::group::$f"
                      "$GITHUB_WORKSPACE/slint-compiler-bin/slint-compiler" -f cpp -I "$(dirname "$f")" -I . $ui_inc "$f" -o /dev/null
                      echo "::endgroup::"
                  done
