name: Update store screenshots

on:
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    screenshots:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-rust
            - uses: ./.github/actions/install-linux-dependencies
            - name: Install optipng
              run: sudo apt-get update && sudo apt-get install --no-install-recommends -y optipng
            - name: Build the viewer
              run: cargo build -p slint-viewer
            - name: Regenerate the screenshot and open a pull request if it changed
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  ./scripts/make-screenshots.sh
                  if git diff --quiet; then
                      echo "Screenshot unchanged."
                      exit 0
                  fi
                  branch=wip/store-screenshots
                  git config user.name "${GITHUB_ACTOR}"
                  git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
                  git switch -c "$branch"
                  git commit -a -m "viewer: update the store-listing screenshot"
                  git push -f origin "$branch"
                  gh pr create --base "${GITHUB_REF_NAME}" --head "$branch" \
                      --title "Update the store-listing screenshot" \
                      --body "Regenerated by the *Update store screenshots* workflow. Review the rendered image in the Files changed tab and merge only if the change is significant and looks correct, with no missing text or layout errors." \
                      || echo "A pull request is already open; updated its branch."
