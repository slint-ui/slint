name: Visual Editor macOS DMG

# This workflow is intentionally isolated while the visual editor DMG pipeline is
# being developed. It does not call the broad repository CI; it only builds the
# macOS DMG artifact for this branch/PR path.
#
# Sources:
# - GitHub workflow syntax: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# - GitHub-hosted macOS runners: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
on:
    workflow_dispatch:
    # The default pull_request activity types include synchronize, so pushing
    # commits to an open PR branch still runs this workflow without needing a
    # separate push trigger that would create duplicate runs.
    #
    # Source: https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#pull_request
    pull_request:
        branches:
            - visual-editor

permissions:
    contents: read

env:
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CARGO_INCREMENTAL: false
    SLINT_BUILD_NUMBER: ${{ github.run_number }}

jobs:
    dmg:
        name: Build signed notarized DMG
        runs-on: macos-15
        timeout-minutes: 90
        env:
            MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
            MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
            MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
            MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
            MACOS_DEVELOPMENT_TEAM: ${{ secrets.MACOS_DEVELOPMENT_TEAM }}
            MACOS_BUNDLE_IDENTIFIER: ${{ secrets.MACOS_BUNDLE_IDENTIFIER }}
            NOTARY_API_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
            NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
            NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        steps:
            - uses: actions/checkout@v6

            # Free space from toolchains this macOS-only DMG build does not use.
            # Avoid deleting Xcode app bundles here: they are huge directory
            # trees and can make this cleanup step slower than the build. The
            # package script separately deletes build intermediates before DMG
            # creation, which is where this job previously ran out of space.
            #
            # Sources:
            # - macos-15 arm64 image software list: https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
            # - GitHub-hosted macOS runners support passwordless sudo: https://docs.github.com/en/actions/reference/runners/github-hosted-runners#administrative-privileges
            - name: Free unused macOS runner disk space
              run: |
                  echo "::group::Disk before cleanup"
                  df -h /
                  echo "::endgroup::"

                  sudo rm -rf \
                      "$ANDROID_HOME" \
                      "$ANDROID_SDK_ROOT" \
                      /Users/runner/Library/Android/sdk \
                      /Users/runner/Library/Developer/CoreSimulator

                  echo "::group::Disk after cleanup"
                  df -h /
                  echo "::endgroup::"

            - uses: ./.github/actions/setup-rust
              with:
                  key: visual-editor-macos-dmg
                  # Swatinem/rust-cache restores caches on all PRs, but only
                  # same-repository PRs should save new cache entries.
                  #
                  # Sources:
                  # - rust-cache save-if/workspaces behavior: https://github.com/Swatinem/rust-cache
                  # - GitHub cache branch scope: https://github.com/actions/cache
                  save_if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

            - name: Install macOS Rust target
              run: rustup target add aarch64-apple-darwin

            # Cache Homebrew's downloaded bottles only. All PRs restore this
            # cache, but only same-repository PRs save it. The installed prefix
            # is left to Homebrew and the runner image; caching the download
            # cache avoids turning /opt/homebrew into a large, brittle artifact.
            #
            # Sources:
            # - GitHub cache restore/save actions: https://github.com/actions/cache
            # - Homebrew cache environment: https://docs.brew.sh/Manpage#cache-options-formula
            - name: Restore Homebrew downloads
              id: homebrew-cache
              uses: actions/cache/restore@v5
              with:
                  path: ~/Library/Caches/Homebrew
                  key: ${{ runner.os }}-${{ runner.arch }}-homebrew-xcodegen-${{ hashFiles('.github/workflows/visual_editor_macos_dmg.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ runner.arch }}-homebrew-xcodegen-

            # XcodeGen is installed through Homebrew as documented by XcodeGen
            # and its Homebrew formula.
            #
            # Sources:
            # - XcodeGen install docs: https://github.com/yonaskolb/XcodeGen
            # - Homebrew xcodegen formula: https://formulae.brew.sh/formula/xcodegen
            - name: Install XcodeGen
              run: brew install xcodegen

            - name: Save Homebrew downloads
              if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.homebrew-cache.outputs.cache-hit != 'true' }}
              uses: actions/cache/save@v5
              with:
                  path: ~/Library/Caches/Homebrew
                  key: ${{ steps.homebrew-cache.outputs.cache-primary-key }}

            - name: Validate packaging environment
              run: ./scripts/package_macos_visual_editor.bash validate-environment

            - name: Install signing material
              run: ./scripts/package_macos_visual_editor.bash install-signing-material

            - name: Archive app with Xcode
              run: ./scripts/package_macos_visual_editor.bash archive-app

            - name: Stage and sign app
              run: ./scripts/package_macos_visual_editor.bash stage-and-sign-app

            - name: Create and sign DMG
              run: ./scripts/package_macos_visual_editor.bash create-and-sign-dmg

            - name: Notarize and staple DMG
              run: ./scripts/package_macos_visual_editor.bash notarize-and-staple-dmg

            - name: Assess stapled app
              run: ./scripts/package_macos_visual_editor.bash assess-stapled-app

            - name: Clean up signing material
              if: ${{ always() }}
              run: ./scripts/package_macos_visual_editor.bash cleanup

            # Sources:
            # - GitHub workflow artifacts: https://docs.github.com/en/actions/tutorials/store-and-share-data
            # - actions/upload-artifact: https://github.com/actions/upload-artifact
            - name: Upload DMG artifact
              uses: actions/upload-artifact@v7
              with:
                  name: slint-visual-editor-macos-dmg
                  path: |
                      dist/*.dmg
                      target/macos-visual-editor-dmg/notarization-log.json
                  if-no-files-found: error
