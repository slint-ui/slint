name: Node.js Test (Reusable)

on:
    workflow_call:
      inputs:
        name:
            description: 'Name of the job'
            required: true
            type: string
        os:
            description: 'Operating system to run on'
            required: true
            type: string
        node_slint:
            description: 'Also run tests with the node-slint runner (builds libnode from source)'
            required: false
            type: boolean
            default: false

env:
    RUSTFLAGS: -D warnings
    CARGO_PROFILE_DEV_DEBUG: 0
    CARGO_INCREMENTAL: false
    RUST_BACKTRACE: 1


jobs:
    node_test:
        name: ${{ inputs.name }}
        runs-on: ${{ inputs.os }}
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/install-linux-dependencies
            - uses: ./.github/actions/install-skia-dependencies
            - name: Setup headless display
              if: runner.os != 'macOS'
              uses: pyvista/setup-headless-display-action@v4
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
              id: node-install
            - uses: pnpm/action-setup@v6.0.8
              with:
                version: 10.29.3
            - uses: ./.github/actions/setup-rust
              with:
                  key: x-napi-v2-${{ steps.node-install.outputs.node-version }} # the cache key consists of a manually bumpable version and the node version, as the cached rustc artifacts contain linking information where to find node.lib, which is in a versioned directory.
            - name: Run pnpm install
              working-directory: api/node
              run: pnpm install --frozen-lockfile
            - name: Build node plugin in debug
              run: pnpm build:testing
              working-directory: api/node
            - name: Run node tests
              working-directory: api/node
              run: pnpm test
            - name: Run test-driver-nodejs
              # Release is only applied to the harness that drives the node.js invocations, but needed
              # to avoid crashing on Windows with what looks like an out of stack exception.
              run: cargo test --verbose --release --all-features -p test-driver-nodejs
              env:
                SLINT_NODE_RUNNER: node

            # --- node-slint runner (optional) ------------------------------------
            - name: Cache libnode
              if: inputs.node_slint
              id: cache-libnode
              uses: actions/cache@v4
              with:
                path: api/node/node-slint/libnode-install
                key: libnode-${{ inputs.os }}-v22.22.2
            - name: Build libnode
              if: inputs.node_slint && steps.cache-libnode.outputs.cache-hit != 'true'
              working-directory: api/node/node-slint
              run: ./build-libnode.sh --prefix "$PWD/libnode-install"
            - name: Build node-slint
              if: inputs.node_slint
              working-directory: api/node/node-slint
              run: |
                cmake -B build -DNODE_DIR="$PWD/libnode-install"
                cmake --build build
            - name: Add node-slint to PATH
              if: inputs.node_slint
              run: |
                echo "${{ github.workspace }}/api/node/node-slint/build" >> "$GITHUB_PATH"
                echo "LD_LIBRARY_PATH=${{ github.workspace }}/api/node/node-slint/libnode-install/lib" >> "$GITHUB_ENV"
            - name: Run test-driver-nodejs (node-slint)
              if: inputs.node_slint
              run: cargo test --verbose --release --all-features -p test-driver-nodejs
              env:
                SLINT_NODE_RUNNER: node-slint

            - name: Check image-filter example
              working-directory: examples/imagefilter/node
              run: pnpm check
