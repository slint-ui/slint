name: Safety Docs

on:
    workflow_dispatch:
    workflow_call:
      secrets:
        CLOUDFLARE_ACCOUNT_ID_2:
          required: true
        CLOUDFLARE_API_TOKEN_2:
          required: true

jobs:
    build:
        name: "Build Safety Manuals"
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5.0.0
              with:
                version: 10.29.3
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: "Build Safety Manual"
              working-directory: docs/safety
              run: pnpm build
            - name: Deploy preview to safety-docs-staging (Workers)
              id: preview
              working-directory: docs/safety
              run: |
                OUTPUT=$(pnpm dlx wrangler@3 versions upload 2>&1)
                echo "$OUTPUT"
                PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | head -1)
                echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
              env:
                CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
                CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
            - name: Create GitHub deployment for PR
              if: steps.preview.outputs.url != '' && github.event_name == 'pull_request'
              uses: actions/github-script@v8
              env:
                PREVIEW_URL: ${{ steps.preview.outputs.url }}
              with:
                script: |
                  const raw = (process.env.PREVIEW_URL || '').trim();
                  const noTrailingSlash = raw.replace(/\/+$/, '');
                  const deploymentUrl = `${noTrailingSlash}/`;
                  const ref = context.payload.pull_request.head.sha;
                  const deployment = await github.rest.repos.createDeployment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref,
                    environment: 'safety-docs-staging',
                    auto_merge: false,
                    required_contexts: []
                  });
                  if (deployment.data.id) {
                    await github.rest.repos.createDeploymentStatus({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      deployment_id: deployment.data.id,
                      state: 'success',
                      environment_url: deploymentUrl,
                      log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                    });
                  }
