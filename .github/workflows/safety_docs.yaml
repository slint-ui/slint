name: Safety Docs

on:
    workflow_dispatch:
    workflow_call:
      secrets:
        CLOUDFLARE_ACCOUNT_ID_2:
          required: true
        CLOUDFLARE_API_TOKEN_2:
          required: true

jobs:
    build:
        name: "Build Safety Manuals"
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.3
              with:
                version: 10.29.3
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: "Build Safety Manual"
              working-directory: docs/safety
              run: pnpm build
            - uses: ./.github/actions/cloudflare-preview-deploy
              with:
                working-directory: docs/safety
                environment: safety-docs-staging
                cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
                cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
