name: Safety Docs

on:
    workflow_dispatch:
    workflow_call:

jobs:
    build:
        name: "Build Safety Manuals"
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
              with:
                version: 10.29.3
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
            - uses: ./.github/actions/install-linux-dependencies
            - uses: ./.github/actions/setup-rust
              with:
                  toolchain: stable
            - name: "Install Node dependencies"
              run: pnpm i --frozen-lockfile
            - name: "Generate SC API reference"
              run: cargo run --release -p slint-doc-generator -- --slint-sc generate-mdx
            - name: "Build Safety Manual"
              working-directory: docs/safety
              run: pnpm build
            - name: Upload preview artifact
              if: github.event_name == 'pull_request'
              uses: actions/upload-artifact@v7
              with:
                name: preview-safety-docs
                path: docs/safety/dist/
