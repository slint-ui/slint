---
name: Build and test the slintpad and required WASM binaries

on:
    workflow_dispatch:
    workflow_call:
      secrets:
        CLOUDFLARE_ACCOUNT_ID_2:
          required: true
        CLOUDFLARE_API_TOKEN_2:
          required: true
jobs:
    wasm:
        env:
            CARGO_PROFILE_RELEASE_OPT_LEVEL: s
            CARGO_INCREMENTAL: false
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/install-linux-dependencies
            - uses: pnpm/action-setup@v6.0.3
              with:
                version: 10.29.3
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
            - uses: ./.github/actions/setup-rust
              with:
                  target: wasm32-unknown-unknown
            - name: Install wasm-pack
              run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

            - name: Compile slint-wasm-interpreter
              run: wasm-pack build --release --target web -- --features console_error_panic_hook
              working-directory: api/wasm-interpreter

            - name: Build slint-wasm-lsp
              env:
                  SLINT_STYLE: fluent-light
              run: pnpm build:wasm_lsp-release
              working-directory: tools/slintpad

            - name: "Upload wasm Artifacts"
              uses: actions/upload-artifact@v7
              with:
                  name: wasm
                  path: |
                      api/wasm-interpreter/pkg/
                      tools/lsp/pkg/

    build-slintpad:
        needs: [wasm]
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                package-manager-cache: false
            - uses: pnpm/action-setup@v6.0.3
              with:
                version: 10.29.3
            - name: Download wasm_lsp Artifacts
              uses: actions/download-artifact@v8
              with:
                  name: wasm
            - name: Install NPM dependencies
              run: pnpm install --frozen-lockfile
              working-directory: tools/slintpad
            - name: Install playwright dependencies
              run: pnpm exec playwright install --with-deps
              working-directory: tools/slintpad
            - name: Compile slintpad
              run: pnpm build
              working-directory: tools/slintpad
            - name: Smoke-Test slintpad
              run: pnpm exec playwright test
              working-directory: tools/slintpad
            - name: Publish Test Summary Results
              if: ${{ always() }}
              working-directory: tools/slintpad
              run: npx github-actions-ctrf playwright-report/ctrf-report.json
            - name: "Upload Playwright Report"
              if: ${{ failure() }}
              uses: actions/upload-artifact@v7
              with:
                  name: slintpad-playwright-report
                  path: |
                      tools/slintpad/playwright-report/
                      tools/slintpad/test-results/
            - name: "Upload slintpad Artifacts"
              uses: actions/upload-artifact@v7
              with:
                  name: slintpad
                  path: tools/slintpad/dist/
            - name: Deploy slintpad to slintpad-staging (Workers)
              id: preview
              working-directory: tools/slintpad
              run: |
                OUTPUT=$(pnpm dlx wrangler@3 versions upload 2>&1)
                echo "$OUTPUT"
                PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | head -1)
                echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
              env:
                CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
                CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
            - name: Create GitHub deployment for PR
              if: steps.preview.outputs.url != '' && github.event_name == 'pull_request'
              uses: actions/github-script@v9
              env:
                PREVIEW_URL: ${{ steps.preview.outputs.url }}
              with:
                script: |
                  const raw = (process.env.PREVIEW_URL || '').trim();
                  const noTrailingSlash = raw.replace(/\/+$/, '');
                  const deploymentUrl = `${noTrailingSlash}/`;
                  const ref = context.payload.pull_request.head.sha;
                  const deployment = await github.rest.repos.createDeployment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref,
                    environment: 'slintpad-staging',
                    auto_merge: false,
                    required_contexts: []
                  });
                  if (deployment.data.id) {
                    await github.rest.repos.createDeploymentStatus({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      deployment_id: deployment.data.id,
                      state: 'success',
                      environment_url: deploymentUrl,
                      log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                    });
                  }

