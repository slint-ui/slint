name: Docs staging preview

on:
  pull_request:
    branches: [master, "feature/*", "pre-release/*"]
  workflow_call:
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN_2:
        required: true

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      deployments: write
    env:
      RUSTFLAGS: -D warnings -W deprecated
      SLINT_NO_QT: 1
      CARGO_INCREMENTAL: false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.29.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: ./.github/actions/install-linux-dependencies
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - name: Create screenshots
        run: cargo run -p slint-docsnapper -- docs/astro/src/content --overwrite
      - name: Generate Slint language docs and build Astro
        run: cargo xtask slintdocs --experimental
      - name: Repackage static assets for Workers (/docs/ base path)
        working-directory: docs/astro
        run: |
          rm -rf cf-assets
          mkdir -p cf-assets/docs
          cp -R dist/. cf-assets/docs/
      - name: Deploy preview to slint-docs-staging (Workers)
        id: preview
        working-directory: docs/astro
        run: |
          OUTPUT=$(pnpm dlx wrangler@3 versions upload 2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | head -1)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
      - name: Create GitHub deployment for PR
        if: steps.preview.outputs.url != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        with:
          script: |
            const raw = (process.env.PREVIEW_URL || '').trim();
            const noTrailingSlash = raw.replace(/\/+$/, '');
            const deploymentUrl = /\/docs$/.test(noTrailingSlash)
              ? `${noTrailingSlash}/`
              : `${noTrailingSlash}/docs/`;
            const ref = context.payload.pull_request.head.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment: 'docs-staging',
              auto_merge: false,
              required_contexts: []
            });
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: deploymentUrl,
                log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }
