[package]
name = "slint-safeui-core"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"
license = "MIT"

[lib]
name = "slint_safeui_core"
path = "src/lib.rs"
crate-type = ["rlib", "staticlib"]

[features]
default = []
cs-cortex-m = ["cortex-m/critical-section-single-core"]
panic-handler = []
pixel-bgra8888 = []
pixel-rgb565 = []
pixel-rgb888 = []

[dependencies]
critical-section = "1.2.0"
cortex-m = { version = "0.7.7", optional = true }
heapless = "0.9.2"
riscv = { version = "0.16.0", optional = true }
slint-sc = { path = "../../../api/slint-sc" }

[build-dependencies]
bindgen = "0.72.1"
slint-build = { path = "../../../api/rs/build" }
