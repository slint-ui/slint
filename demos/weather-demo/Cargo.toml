# cSpell:ignore openweather urlencoding
[package]
name = "weather-demo"
version = "1.18.0"
authors = ["FELGO GmbH <contact@felgo.com>"]
edition.workspace = true
build = "build.rs"
publish = false
license = "MIT"

[dependencies]
async-std = "1.12.0"
chrono = { version = "0.4.38", optional = true, default-features = false, features = ["clock"] }
directories = "6.0"
log = "0.4.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.115"
slint = { path = "../../api/rs/slint", features = ["backend-android-activity-06"] }

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "android")))'.dependencies]
env_logger = "0.11.3"

[target.'cfg(target_os = "android")'.dependencies]
android_logger = "0.15.1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
futures = { version = "0.3", optional = true }
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"], optional = true }
urlencoding = { version = "2", optional = true }
tokio = { version = "1.37.0", features = ["rt-multi-thread"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_log = "1.0"
console_error_panic_hook = "0.1.7"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

[build-dependencies]
slint-build = { path = "../../api/rs/build" }

[features]
default = ["chrono", "open_meteo"]
open_meteo = ["dep:futures", "dep:reqwest", "dep:urlencoding"]

# Android-activity / wasm support
[lib]
crate-type = ["lib", "cdylib"]
path = "src/lib.rs"

[[bin]]
name = "weather-demo"
path = "src/main.rs"

# Android settings
# See more: https://github.com/rust-mobile/cargo-apk?tab=readme-ov-file#manifest
[package.metadata.android]
package = "dev.slint.examples.weatherdemo"
resources = "android-res"
build_targets = ["aarch64-linux-android"]

[package.metadata.android.application]
label = "Weather Demo"
icon = "@mipmap/ic_launcher"

[[package.metadata.android.uses_permission]]
name = "android.permission.INTERNET"
