[package]
name = "test-driver-go"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false

[[bin]]
path = "main.rs"
name = "test-driver-go"

[dependencies]
i-slint-compiler = { workspace = true, features = ["default", "go", "display-diagnostics", "bundle-translations"] }
scopeguard = "1.1.0"
spin_on = { workspace = true }
tempfile = "3"

[dev-dependencies]
test_driver_lib = { path = "../driverlib" }

[build-dependencies]
slint-cpp = { workspace = true, default-features = false, features = ["interpreter", "testing", "backend-testing"] }
test_driver_lib = { path = "../driverlib" }
