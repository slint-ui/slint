[package]
name = "test-driver-typescript"
description = "Driver for the TypeScript type generation in tests/cases in Slint"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false

[[bin]]
path = "main.rs"
name = "test-driver-typescript"

[dependencies]
spin_on = { workspace = true }

[dev-dependencies]
test_driver_lib = { path = "../driverlib" }
i-slint-compiler = { workspace = true, features = ["default", "typescript", "display-diagnostics", "bundle-translations"] }

[build-dependencies]
test_driver_lib = { path = "../driverlib" }
