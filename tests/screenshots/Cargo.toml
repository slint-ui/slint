[package]
name = "test-driver-screenshots"
description = "Driver for the tests taking screenshots in Slint"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false

[[bin]]
path = "main.rs"
name = "test-driver-screenshot"

[features]
default = ["skia", "software", "slint-sc"]
software = ["slint/renderer-software", "dep:i-slint-compiler"]
skia = ["dep:i-slint-renderer-skia", "dep:slint-interpreter"]
# slint-sc does not depend on `software`: the screenshot driver
# (`slint_sc.rs`) does its own byte-for-byte PNG comparison via the
# `image` crate, so the software renderer is not pulled in.
slint-sc = ["dep:slint-sc", "dep:i-slint-compiler"]

[dependencies]
slint = { workspace = true, features = ["std", "compat-1-2"], optional = true }
i-slint-core = { workspace = true, features = ["unicode", "std"] }

i-slint-renderer-skia = { workspace = true, optional = true }
slint-interpreter = { workspace = true, features = ["display-diagnostics", "compat-1-2"], optional = true }
slint-sc = { path = "../../api/slint-sc", optional = true }

image = { workspace = true }
crossterm = "0.29"

[build-dependencies]
i-slint-compiler = { workspace = true, features = ["default", "rust", "display-diagnostics", "software-renderer"], optional = true }
walkdir = "2.3"
spin_on = { workspace = true }
test_driver_lib = { path = "../driver/driverlib" }
