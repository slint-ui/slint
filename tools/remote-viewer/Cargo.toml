[package]
name = "remote-viewer"
description = "The remote viewer binary for Slint"
authors.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
categories = ["gui", "development-tools"]
keywords = ["viewer", "gui", "ui", "toolkit"]

[lib]
crate-type = ["lib", "cdylib"]
path = "src/lib.rs"

[[bin]]
name = "remote-viewer"
path = "src/main.rs"

[dependencies]
i-slint-compiler = { workspace = true }
i-slint-core = { workspace = true }
i-slint-backend-selector = { workspace = true }
i-slint-preview-protocol = { workspace = true }
slint-interpreter = { workspace = true, features = ["display-diagnostics", "compat-1-2", "internal", "accessibility", "image-default-formats", "internal-json"] }
slint = { workspace = true, features = ["default", "serde", "backend-android-activity-06"] }
lsp-types = { version = "0.95.0" }
serde = { version = "1.0", features = ["derive"] }
dashmap = { version = "6.1.0" }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
hostname = { version = "0.4.1" }
tokio-tungstenite = { version = "0.28.0", features = ["rustls"] }
tokio = { version = "1.48.0", features = ["rt", "rt-multi-thread", "net", "sync", "macros"] }
futures-util = { version = "0.3.31", features = ["sink"] }
anyhow = "1.0.100"
postcard = { version = "1.1.3", features = ["alloc"] }

[target.'cfg(not(any(target_vendor = "apple", target_arch = "wasm32")))'.dependencies]
mdns-sd = { version = "0.17.0", default-features = false, features = ["async"] }

[target.'cfg(target_vendor = "apple")'.dependencies]
zeroconf-tokio = "0.3.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
getifs = "0.4.0"

[package.metadata.android]
package = "dev.slint.remoteviewer"
min_sdk_version = 24
target_sdk_version = 33

[package.metadata.android.application]
label = "Slint Remote Viewer"

[[package.metadata.android.uses_permission]]
name = "android.permission.INTERNET"

[[package.metadata.android.uses_permission]]
name = "android.permission.CHANGE_WIFI_MULTICAST_STATE"
