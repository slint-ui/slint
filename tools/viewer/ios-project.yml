# cSpell:ignore S3GWAKQTX6
name: Slint Viewer
options:
  bundleIdPrefix: dev.slint
settings:
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  # Defaults for local builds; CI overrides these via xcodebuild to inject the
  # Slint version and a monotonic, git-derived build number (commit count).
  MARKETING_VERSION: "1.17.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  slint-viewer:
    type: application
    platform: iOS
    deploymentTarget: "16.6"
    scheme: {}
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S3GWAKQTX6
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Slint Viewer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        # Must be a dictionary (an empty one yields the default launch screen);
        # iPad multitasking requires a valid UILaunchScreen.
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "We need to talk to editors on the local network."
        NSBonjourServices:
          - "_slint-preview._tcp"
        UISupportedInterfaceOrientations:
          [
            UIInterfaceOrientationPortrait,
            UIInterfaceOrientationPortraitUpsideDown,
            UIInterfaceOrientationLandscapeLeft,
            UIInterfaceOrientationLandscapeRight,
          ]
    sources:
      # Generated at build time by the pre-build script below, so it may be
      # absent when the project is generated.
      - path: Assets.xcassets
        optional: true
      # Bundled for the remote idle UI: @image-url("assets/...") resolves under the
      # app bundle (see remote.rs). Use copyFiles with subpath so XcodeGen/Xcode
      # place files in Slint Viewer.app/assets/ (folder references with nested
      # paths are unreliable in recent XcodeGen versions).
      - path: remote/assets
        buildPhase:
          copyFiles:
            destination: resources
            subpath: assets
    preBuildScripts:
      - name: Generate app icon
        script: |
          ../../scripts/render_ios_app_icon.bash
        outputFiles:
          - $(SRCROOT)/Assets.xcassets/AppIcon.appiconset/icon-1024.png
      - name: Sync remote UI assets
        script: |
          set -e
          mkdir -p remote/assets
          cp ../../logo/slint-logo-small-light.svg remote/assets/
          for asset in bg-frame.svg bg-frame-light.svg; do
            test -f "remote/assets/${asset}" || { echo "missing remote/assets/${asset}"; exit 1; }
          done
        inputFiles:
          - $(SRCROOT)/../../logo/slint-logo-small-light.svg
          - $(SRCROOT)/remote/assets/bg-frame.svg
          - $(SRCROOT)/remote/assets/bg-frame-light.svg
        outputFiles:
          - $(SRCROOT)/remote/assets/slint-logo-small-light.svg
    postCompileScripts:
      - script: |
          ../../scripts/build_for_ios_with_cargo.bash slint-viewer --features remote
        outputFileLists: $TARGET_BUILD_DIR/$EXECUTABLE_PATH
