[package]
name = "i-slint-live-preview"
description.workspace = true
authors.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
# protocol
lsp-types = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
derive_more = { workspace = true, features = ["debug"], optional = true }
# file-watcher
notify = { version = "8.0.0", default-features = false, features = ["macos_kqueue"], optional = true }
i-slint-compiler = { workspace = true, optional = true }
# live-component
i-slint-core = { workspace = true, optional = true }
slint-interpreter = { workspace = true, optional = true, default-features = false, features = ["display-diagnostics", "compat-1-2", "internal"] }
# remote
dashmap = { version = "6.1.0", optional = true }
tokio-tungstenite = { version = "0.30.0", optional = true }
tokio = { version = "1.48.0", features = ["rt", "net", "sync", "macros", "time"], optional = true }
futures-util = { version = "0.3.31", features = ["sink"], optional = true }
postcard = { version = "1.1.3", features = ["alloc"], optional = true }
base64 = { version = "0.22.1", optional = true }
hostname = { version = "0.4.1", optional = true }
tracing = { workspace = true, optional = true }
anyhow = { version = "1.0.100", optional = true }

[target.'cfg(not(any(target_vendor = "apple", target_arch = "wasm32")))'.dependencies]
mdns-sd = { version = "0.20.0", default-features = false, features = ["async"], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
getifs = { version = "0.6.1", optional = true }

[lib]
path = "lib.rs"

[features]
protocol = ["dep:lsp-types", "dep:serde", "dep:serde_json", "dep:derive_more"]
file-watcher = ["dep:notify", "dep:i-slint-compiler"]
live-component = ["file-watcher", "dep:slint-interpreter", "dep:i-slint-core"]
ffi = ["live-component", "slint-interpreter/ffi"]
remote = [
  "protocol",
  "dep:slint-interpreter",
  "dep:i-slint-core",
  "dep:i-slint-compiler",
  "dep:tracing",
  "dep:dashmap",
  "dep:tokio-tungstenite",
  "dep:tokio",
  "dep:futures-util",
  "dep:anyhow",
  "dep:postcard",
  "dep:base64",
  "dep:hostname",
  "dep:mdns-sd",
  "dep:getifs",
  "slint-interpreter/accessibility",
  "slint-interpreter/image-default-formats",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--generate-link-to-definition"]
