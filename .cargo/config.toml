# Share a single target directory across all of the repository's workspaces
# (root libraries, examples/, demos/, tests/, ui-libraries/material/). Because
# cargo discovers this config by walking up from the current directory and a
# relative `target-dir` is resolved relative to this file, running cargo from
# any of those workspaces writes to (and reuses) the same `<repo>/target`.
# Combined with identical `[profile]` settings in every workspace, the common
# library crates are built once instead of once per workspace.
[build]
target-dir = "target"

[alias]
xtask = "run --locked --package xtask --"

[target.xtensa-esp32s3-none-elf]
rustflags = [
  "-C",
  "link-arg=-nostartfiles",
  # Without this flag, we get miscompilation of floating point operations that cause the clipping region to be totally wrong
  "-C",
  "target-feature=-fp",
]

[target.xtensa-esp32s2-none-elf]
rustflags = [
  # Enable the atomic codegen option for Xtensa
  "-C",
  "target-feature=+s32c1i",
]

[target.x86_64-pc-windows-msvc]
# Increase default stack size to avoid running out of stack
# space in debug builds. The size matches Linux's default.
rustflags = ["-C", "link-arg=/STACK:8000000"]
[target.aarch64-pc-windows-msvc]
# Increase default stack size to avoid running out of stack
# space in debug builds. The size matches Linux's default.
rustflags = ["-C", "link-arg=/STACK:8000000"]
